<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pionix Dashboard - Premium License System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0B0D12;
            color: #FFFFFF;
            background-image: radial-gradient(circle at top right, rgba(127, 227, 19, 0.03) 0%, transparent 40%);
        }
        .custom-card {
            background-color: #131722;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        .input-dark {
            background-color: #1A202E;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .input-dark:focus {
            border-color: #7FE313;
            box-shadow: 0 0 12px rgba(127, 227, 19, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white mb-1">Selamat Datang, Admin</h1>
                <p class="text-sm text-gray-400">Manage premium license keys and server credentials from this central dashboard.</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="flex items-center gap-2 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-4 py-2 rounded-full text-xs font-semibold">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> Online Status
                </span>
            </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="custom-card p-5 rounded-2xl flex flex-col justify-between">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-xs font-semibold text-gray-400 tracking-wider uppercase">Total Licenses</p>
                    <div class="w-8 h-8 rounded-xl bg-orange-500/10 flex items-center justify-center text-orange-400"><i class="fa-solid fa-id-card"></i></div>
                </div>
                <div>
                    <h3 id="statTotalLicenses" class="text-3xl font-bold text-white">0</h3>
                </div>
            </div>

            <div class="custom-card p-5 rounded-2xl flex flex-col justify-between">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-xs font-semibold text-gray-400 tracking-wider uppercase">Active Slots</p>
                    <div class="w-8 h-8 rounded-xl bg-green-500/10 flex items-center justify-center text-green-400"><i class="fa-solid fa-bolt"></i></div>
                </div>
                <div>
                    <h3 id="statActiveLicenses" class="text-3xl font-bold text-white">0</h3>
                </div>
            </div>

            <div class="custom-card p-5 rounded-2xl flex flex-col justify-between">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-xs font-semibold text-gray-400 tracking-wider uppercase">Server Status</p>
                    <div class="w-8 h-8 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400"><i class="fa-solid fa-server"></i></div>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-emerald-400 flex items-center gap-2">Online</h3>
                </div>
            </div>

            <div class="custom-card p-5 rounded-2xl flex flex-col justify-between">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-xs font-semibold text-gray-400 tracking-wider uppercase">My Credits</p>
                    <div class="w-8 h-8 rounded-xl bg-yellow-500/10 flex items-center justify-center text-yellow-400"><i class="fa-solid fa-coins"></i></div>
                </div>
                <div>
                    <h3 class="text-3xl font-bold text-yellow-400">999,999</h3>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="custom-card p-6 rounded-2xl">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-2 h-4 rounded bg-[#7FE313]"></div>
                        <h2 class="text-md font-bold tracking-wide uppercase text-white">Create New License</h2>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">License Key Only</label>
                        <div class="flex gap-2">
                            <input type="text" id="licenseKey" class="w-full input-dark rounded-xl px-4 py-3 text-sm font-semibold font-mono text-white" placeholder="PX-XXXXXXXXXX">
                            <button type="button" onclick="generateRandomKey()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold text-xs px-4 rounded-xl transition duration-200">Random</button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Buyer Name</label>
                        <input type="text" id="userName" class="w-full input-dark rounded-xl px-4 py-3 text-sm text-white" placeholder="Nama Pelanggan">
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Duration Time</label>
                        <select id="licenseDuration" class="w-full input-dark rounded-xl px-4 py-3 text-sm text-white bg-[#1A202E] border border-white/5">
                            <option value="1" class="bg-[#131722]">1 Hari (Trial)</option>
                            <option value="30" class="bg-[#131722]">30 Hari (1 Bulan)</option>
                            <option value="365" class="bg-[#131722]">365 Hari (1 Tahun)</option>
                            <option value="lifetime" class="bg-[#131722]">Lifetime (Abadi)</option>
                        </select>
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Device Limit (Slot)</label>
                        <select id="deviceLimit" class="w-full input-dark rounded-xl px-4 py-3 text-sm text-white bg-[#1A202E] border border-white/5">
                            <option value="1" class="bg-[#131722]">1 Device</option>
                            <option value="2" class="bg-[#131722]">2 Devices</option>
                            <option value="∞" class="bg-[#131722]">Unlimited Devices (∞)</option>
                        </select>
                    </div>

                    <button onclick="createLicense()" class="w-full bg-[#7FE313] hover:bg-[#68bc0e] text-[#0B0D12] font-bold text-sm py-4 rounded-xl transition duration-300 transform active:scale-[0.98] shadow-lg shadow-[#7FE313]/10">
                        DEPLOY TO FIREBASE
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="custom-card p-6 rounded-2xl h-full flex flex-col">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-4 rounded bg-[#7FE313]"></div>
                            <h2 class="text-md font-bold tracking-wide uppercase text-white">Active Database Stream</h2>
                        </div>
                        <div class="relative max-w-xs w-full">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fa-solid fa-magnifying-glass text-xs"></i></span>
                            <input type="text" id="tableSearch" onkeyup="searchTable()" class="w-full bg-[#1A202E]/60 border border-white/5 rounded-xl pl-9 pr-4 py-2 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-[#7FE313]/50" placeholder="Cari lisensi atau nama...">
                        </div>
                    </div>

                    <div class="overflow-x-auto flex-1 rounded-xl border border-white/5">
                        <table class="w-full text-left text-sm">
                            <thead class="text-xs text-gray-400 uppercase tracking-wider bg-[#1A202E]/40 border-b border-white/5">
                                <tr>
                                    <th class="px-5 py-4">License Key</th>
                                    <th class="px-5 py-4">Name</th>
                                    <th class="px-5 py-4">Expiry Date</th>
                                    <th class="px-5 py-4">Limit</th>
                                    <th class="px-5 py-4">Status</th>
                                    <th class="px-5 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="licenseTableBody" class="divide-y divide-white/5">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Konfigurasi Project Firebase Murni dari Kredensial Berkas Google-Services Kamu
        const firebaseConfig = {
            apiKey: "AIzaSyDWjhqrWcXZ6kmDRYjQnu9D4mHDvaYMorU",
            authDomain: "pionixx.firebaseapp.com",
            databaseURL: "https://pionixx-default-rtdb.asia-southeast1.firebasedatabase.app/", 
            projectId: "pionixx",
            storageBucket: "pionixx.firebasestorage.app",
            messagingSenderId: "575526339969",
            appId: "1:575526339969:android:4740ab172d5bfa64c01480"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Fungsi pembantu memformat tanggal standar (dd-MM-yyyy)
        function formatDate(date) {
            let d = new Date(date),
                month = '' + (d.getMonth() + 1),
                day = '' + d.getDate(),
                year = d.getFullYear();
            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;
            return [day, month, year].join('-');
        }

        // FUNGSI UTAMA: MEMBUAT KUNCI LISENSI KE FIREBASE
        window.createLicense = function() {
            const key = document.getElementById('licenseKey').value.trim();
            const name = document.getElementById('userName').value.trim();
            const duration = document.getElementById('licenseDuration').value;
            const device = document.getElementById('deviceLimit').value;

            if(!key || !name) { alert('Harap isi Kunci Lisensi dan Nama Pembeli!'); return; }

            let expString = "";
            let today = new Date();
            if(duration === "lifetime") {
                expString = "31-12-2099"; 
            } else {
                today.setDate(today.getDate() + parseInt(duration));
                expString = formatDate(today);
            }

            const regString = formatDate(new Date());

            // Menyimpan data bersih murni menuju cabang 'UserLicense'
            set(ref(db, 'UserLicense/' + key), {
                ID: key,
                Name: name,
                Exp: expString,
                Register: regString,
                Reseller: "Admin",
                Device: device,
                Status: "true",
                UID1: "null", 
                UID2: "null"
            }).then(() => {
                alert('🚀 Lisensi PX Berhasil Dideploy!');
                document.getElementById('licenseKey').value = '';
                document.getElementById('userName').value = '';
            }).catch((err) => { alert('Gagal menulis data: ' + err.message); });
        }

        // AMBIL ALIRAN DATA FIREBASE KE TABEL SECARA REALTIME
        const dbRef = ref(db, 'UserLicense');
        onValue(dbRef, (snapshot) => {
            const tbody = document.getElementById('licenseTableBody');
            tbody.innerHTML = "";
            
            let totalCount = 0;
            let activeCount = 0;

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    totalCount++;
                    const data = childSnapshot.val();
                    const keyId = childSnapshot.key;

                    const isActive = (data.Status === "true" || data.Status === "active");
                    if (isActive) activeCount++;

                    let statusBadge = isActive 
                        ? `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-1 rounded-lg text-xs font-semibold">Active</span>` 
                        : `<span class="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2.5 py-1 rounded-lg text-xs font-semibold">Paused</span>`;

                    let pauseResumeBtn = isActive
                        ? `<button class="text-xs bg-sky-500/10 hover:bg-sky-500 text-sky-400 hover:text-white px-3 py-1.5 rounded-lg border border-sky-500/20 font-medium transition duration-150" onclick="toggleStatus('${keyId}', 'banned')"><i class="fa-solid fa-pause mr-1"></i> Pause</button>`
                        : `<button class="text-xs bg-emerald-500/10 hover:bg-emerald-500 text-emerald-400 hover:text-white px-3 py-1.5 rounded-lg border border-emerald-500/20 font-medium transition duration-150" onclick="toggleStatus('${keyId}', 'true')"><i class="fa-solid fa-play mr-1"></i> Resume</button>`;

                    let row = `<tr class="hover:bg-white/[0.01] transition duration-150">
                        <td class="px-5 py-4 font-mono font-bold text-[#7FE313]">${data.ID || keyId}</td>
                        <td class="px-5 py-4 font-medium text-gray-200">${data.Name || '-'}</td>
                        <td class="px-5 py-4 font-mono text-xs text-gray-400">${data.Exp}</td>
                        <td class="px-5 py-4"><span class="bg-white/5 border border-white/10 px-2 py-0.5 rounded text-xs font-mono">${data.Device || '1'} DEV</span></td>
                        <td class="px-5 py-4">${statusBadge}</td>
                        <td class="px-5 py-4 text-right flex items-center justify-end gap-2">
                            ${pauseResumeBtn}
                            <button class="text-xs bg-amber-500/10 hover:bg-amber-500 text-amber-400 hover:text-white px-3 py-1.5 rounded-lg border border-amber-500/20 font-medium transition duration-150" onclick="resetHWID('${keyId}')"><i class="fa-solid fa-arrows-rotate mr-1"></i> Reset</button>
                            <button class="text-xs bg-rose-500/10 hover:bg-rose-500 text-rose-400 hover:text-white px-3 py-1.5 rounded-lg border border-rose-500/20 font-medium transition duration-150" onclick="deleteKey('${keyId}')"><i class="fa-solid fa-trash mr-1"></i> Hapus</button>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-sm text-gray-500">Database Stream Clear. Belum ada lisensi.</td></tr>`;
            }

            // Memperbarui Kotak Informasi Statistik Atas secara dinamis
            document.getElementById('statTotalLicenses').innerText = totalCount;
            document.getElementById('statActiveLicenses').innerText = activeCount;
        });

        // ACTION: AKTIF / JEDA LISENSI
        window.toggleStatus = function(key, currentTargetStatus) {
            update(ref(db, 'UserLicense/' + key), { Status: currentTargetStatus });
        }

        // ACTION: MEMBERSIHKAN DATA HWID
        window.resetHWID = function(key) {
            update(ref(db, 'UserLicense/' + key), { UID1: "null", UID2: "null" })
            .then(() => { alert('🔄 Kunci HWID untuk ' + key + ' berhasil di-reset!'); });
        }

        // ACTION: MENGHAPUS LISENSI SECARA TOTAL
        window.deleteKey = function(key) {
            if(confirm('Apakah Anda yakin ingin menghapus permanen lisensi: ' + key + '?')) {
                remove(ref(db, 'UserLicense/' + key));
            }
        }

        // ACTION: MEMBUAT KUNCI ACAK AWALAN PX-
        window.generateRandomKey = function() {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = 'PX-';
            for (let i = 0; i < 10; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            document.getElementById('licenseKey').value = result;
        }

        // FITUR FILTER PENCARIAN REALTME PADA TABEL
        window.searchTable = function() {
            let input = document.getElementById("tableSearch").value.toLowerCase();
            let rows = document.getElementById("licenseTableBody").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                let cellKey = rows[i].getElementsByTagName("td")[0];
                let cellName = rows[i].getElementsByTagName("td")[1];
                if (cellKey || cellName) {
                    let textKey = cellKey.textContent || cellKey.innerText;
                    let textName = cellName.textContent || cellName.innerText;
                    if (textKey.toLowerCase().indexOf(input) > -1 || textName.toLowerCase().indexOf(input) > -1) {
                        rows[i].style.display = "";
                    } else {
                        rows[i].style.display = "none";
                    }
                }
            }
        }
    </script>
</body>
</html>
